<svg viewBox="420 40 720 380" xmlns="http://www.w3.org/2000/svg">
    <style>
        .main{
        stroke:#111827;
        stroke-width:2;
        stroke-linecap:round;
        stroke-linejoin:round;
        fill:none;
        }

        .soft{
        stroke:#6b7280;
        stroke-width:1.3;
        stroke-linecap:round;
        fill:none;
        opacity:.7;
        }

        .node{
        fill:#374151;
        }

        .panel{
        fill:#e5e7eb;
        }

        .glow{
        opacity:.15;
        }

        @media (prefers-color-scheme: dark){
        .main{stroke:#f3f4f6}
        .soft{stroke:#9ca3af}
        .node{fill:#e5e7eb}
        .panel{fill:#1f2937}
        .glow{opacity:.25}
        }
    </style>

    <!-- subtle tech mesh -->
    <g class="soft">
        <line x1="760" y1="110" x2="900" y2="70" />
        <line x1="900" y1="70" x2="1050" y2="160" />
        <line x1="1050" y1="160" x2="930" y2="270" />
        <line x1="930" y1="270" x2="770" y2="210" />
        <line x1="770" y1="210" x2="760" y2="110" />

        <line x1="900" y1="70" x2="930" y2="270" />
        <line x1="760" y1="110" x2="1050" y2="160" />
    </g>

    <!-- nodes -->
    <circle cx="760" cy="110" r="4" class="node" />
    <circle cx="900" cy="70" r="4" class="node" />
    <circle cx="1050" cy="160" r="4" class="node" />
    <circle cx="930" cy="270" r="4" class="node" />
    <circle cx="770" cy="210" r="4" class="node" />

    <!-- glow accent -->
    <circle cx="900" cy="180" r="120" class="node glow" />

    <!-- desk -->
    <rect x="470" y="340" width="260" height="8" rx="4" class="panel" />

    <!-- laptop -->
    <rect x="530" y="260" width="150" height="80" rx="10" class="main" />
    <rect x="520" y="340" width="170" height="8" rx="4" class="panel" />

    <!-- code symbol -->
    <polyline points="565,300 545,315 565,330" class="main" />
    <polyline points="645,300 665,315 645,330" class="main" />

    <!-- developer -->
    <circle cx="610" cy="215" r="22" class="main" />
    <path d="M570 255c15-32 80-32 90 0" class="main" />

    <!-- arms -->
    <line x1="575" y1="255" x2="545" y2="305" class="main" />
    <line x1="645" y1="255" x2="675" y2="305" class="main" />

    <!-- floating ui panels -->
    <rect x="850" y="300" width="80" height="44" rx="10" class="panel" />
    <rect x="960" y="220" width="80" height="44" rx="10" class="panel" />
    <rect x="1030" y="300" width="70" height="38" rx="10" class="panel" />

    <!-- panel lines -->
    <line x1="865" y1="320" x2="915" y2="320" class="soft" />
    <line x1="865" y1="330" x2="900" y2="330" class="soft" />

    <line x1="975" y1="240" x2="1025" y2="240" class="soft" />
    <line x1="975" y1="250" x2="1010" y2="250" class="soft" />

    <line x1="1045" y1="318" x2="1080" y2="318" class="soft" />
</svg>
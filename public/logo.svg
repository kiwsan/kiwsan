<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <defs>
    <clipPath id="kBox">
      <rect width="64" height="64" rx="16"/>
    </clipPath>
    <clipPath id="kDark">
      <polygon points="0,0 64,0 0,64"/>
    </clipPath>
    <clipPath id="kLight">
      <polygon points="64,0 64,64 0,64"/>
    </clipPath>
  </defs>

  <g clip-path="url(#kBox)">
    <polygon points="0,0 64,0 0,64" fill="#111111"/>
    <polygon points="64,0 64,64 0,64" fill="#E8E8E8"/>

    <g clip-path="url(#kDark)">
      <rect x="18" y="14" width="6.5" height="36" fill="#E8E8E8"/>
      <line x1="23" y1="32" x2="44" y2="14" stroke="#E8E8E8" stroke-width="6.5" stroke-linecap="round"/>
      <line x1="23" y1="32" x2="44" y2="50" stroke="#E8E8E8" stroke-width="6.5" stroke-linecap="round"/>
    </g>

    <g clip-path="url(#kLight)">
      <rect x="18" y="14" width="6.5" height="36" fill="#111111"/>
      <line x1="23" y1="32" x2="44" y2="14" stroke="#111111" stroke-width="6.5" stroke-linecap="round"/>
      <line x1="23" y1="32" x2="44" y2="50" stroke="#111111" stroke-width="6.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>

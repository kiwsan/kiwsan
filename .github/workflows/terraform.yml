name: Terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  TF_VERSION: 1.6.0
  AWS_REGION: ap-southeast-1
  TF_DIR: ./terraform

jobs:
  # build-and-test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #         cache: 'npm'

  #     - name: Install Dependencies
  #       run: npm ci

  #     - name: Build
  #       run: npm run build

  #     - name: Install Test Dependencies
  #       run: npm ci
  #       working-directory: ./tests

  #     - name: Install Playwright Browsers
  #       run: npx playwright install --with-deps
  #       working-directory: ./tests

  #     - name: Test
  #       run: npm test
  #       working-directory: ./tests

  deploy:
    runs-on: ubuntu-latest
    # needs: build-and-test
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Version
        id: version
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          cat << 'EOF' > generate_version.js
          /* sonar-disable-file */
          function generateVersion() {
              const now = new Date();
              const year = now.getFullYear();
              const month = String(now.getMonth() + 1).padStart(2, '0');
              const day = String(now.getDate()).padStart(2, '0');
              const countYear = year - 2023;
              const version = `${countYear}.${month}.${day}`;
              const build = `${year}.${month}.${process.env.GITHUB_RUN_ID || 'local'}`;
              return { version, build };
          }
          const result = generateVersion();
          console.log(`::set-output name=version::${result.version}`);
          console.log(`::set-output name=build::${result.build}`);
          EOF
          node generate_version.js

      - name: Build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm run build
        env:
          PUBLIC_BUILD_VERSION: ${{ steps.version.outputs.build }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}
      
      - name: Terraform Format
        run: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true
      
      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}
      
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ env.TF_DIR }}
      
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pusher: @${{ github.actor }}*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
      
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_DIR }}

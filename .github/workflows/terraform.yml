name: Terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  TF_VERSION: 1.6.0
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_DIR: ./terraform
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Lint & Static Analysis
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Astro Check (Type Check)
        run: npx astro check

      - name: Dependency Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Stage 2: Build & Test
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Install Test Dependencies
        run: npm ci
        working-directory: ./tests

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./tests

      # - name: Run E2E Tests
      #   run: npm test
      #   working-directory: ./tests

      # - name: Upload Test Report
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: playwright-report
      #     path: tests/playwright-report/
      #     retention-days: 7

  # ──────────────────────────────────────────────
  # Stage 3: Security Scanning
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Dependency Vulnerability Scan
        run: npx audit-ci --high
        continue-on-error: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: TFSec - Terraform Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_DIR }}
          soft_fail: true

  # ──────────────────────────────────────────────
  # Stage 4: Terraform Plan (PR only)
  # ──────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [build-and-test, security]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="bucket_name=${{ secrets.BUCKET_NAME }}"
        working-directory: ${{ env.TF_DIR }}

      - name: Comment PR with Plan
        uses: actions/github-script@v8
        with:
          script: |
            const output = `### Terraform Plan

            #### Format & Validate
            - Format: \`${{ steps.plan.outcome }}\`
            - Validate: \`success\`

            #### Plan Output
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ──────────────────────────────────────────────
  # Stage 5: Deploy to Production (push to main)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-and-test, security]
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Version
        id: version
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          cat << 'EOF' > generate_version.js
          function generateVersion() {
              const now = new Date();
              const year = now.getFullYear();
              const month = String(now.getMonth() + 1).padStart(2, '0');
              const day = String(now.getDate()).padStart(2, '0');
              const countYear = year - 2023;
              const version = `${countYear}.${month}.${day}`;
              const build = `${year}.${month}.${process.env.GITHUB_RUN_ID || 'local'}`;
              return { version, build };
          }
          const result = generateVersion();
          console.log(`version=${result.version}`);
          console.log(`build=${result.build}`);
          EOF
          node generate_version.js >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build
        env:
          PUBLIC_BUILD_VERSION: ${{ steps.version.outputs.build }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="bucket_name=${{ secrets.BUCKET_NAME }}"
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_DIR }}

  # ──────────────────────────────────────────────
  # Stage 6: Post-Deploy Verification
  # ──────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for deployment propagation
        run: sleep 15

      - name: Health Check - HTTP Status
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SITE_URL }}" || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Smoke test FAILED - HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test PASSED"

      - name: Verify HTML Content
        run: |
          BODY=$(curl -s "${{ secrets.SITE_URL }}")
          if echo "$BODY" | grep -q "<html"; then
            echo "HTML content verified"
          else
            echo "No HTML content found"
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Stage 7: Notification
  # ──────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ] && [ "${{ needs.smoke-test.result }}" == "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "message=Deployment successful" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "message=Deployment failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2.0.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.status.outputs.result == 'success' && 'Deploy Success' || 'Deploy Failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.status.outputs.result == 'success' && ':white_check_mark:' || ':x:' }} *${{ steps.status.outputs.message }}*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* `${{ github.sha }}`\n*Actor:* ${{ github.actor }}\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }

